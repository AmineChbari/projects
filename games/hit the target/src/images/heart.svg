<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- 8-bit pixel heart : crimson + highlight + outline -->
  <g>
    <!-- outline -->
    <rect x="6"  y="6"  width="4" height="2" fill="#3a0808"/>
    <rect x="22" y="6"  width="4" height="2" fill="#3a0808"/>
    <rect x="4"  y="8"  width="2" height="2" fill="#3a0808"/>
    <rect x="10" y="8"  width="4" height="2" fill="#3a0808"/>
    <rect x="18" y="8"  width="4" height="2" fill="#3a0808"/>
    <rect x="26" y="8"  width="2" height="2" fill="#3a0808"/>
    <rect x="4"  y="10" width="2" height="6" fill="#3a0808"/>
    <rect x="26" y="10" width="2" height="6" fill="#3a0808"/>
    <rect x="6"  y="16" width="2" height="2" fill="#3a0808"/>
    <rect x="24" y="16" width="2" height="2" fill="#3a0808"/>
    <rect x="8"  y="18" width="2" height="2" fill="#3a0808"/>
    <rect x="22" y="18" width="2" height="2" fill="#3a0808"/>
    <rect x="10" y="20" width="2" height="2" fill="#3a0808"/>
    <rect x="20" y="20" width="2" height="2" fill="#3a0808"/>
    <rect x="12" y="22" width="2" height="2" fill="#3a0808"/>
    <rect x="18" y="22" width="2" height="2" fill="#3a0808"/>
    <rect x="14" y="24" width="4" height="2" fill="#3a0808"/>

    <!-- main red body -->
    <rect x="6"  y="8"  width="4" height="2" fill="#B22222"/>
    <rect x="22" y="8"  width="4" height="2" fill="#B22222"/>
    <rect x="6"  y="10" width="20" height="6" fill="#B22222"/>
    <rect x="8"  y="16" width="16" height="2" fill="#B22222"/>
    <rect x="10" y="18" width="12" height="2" fill="#B22222"/>
    <rect x="12" y="20" width="8"  height="2" fill="#B22222"/>
    <rect x="14" y="22" width="4"  height="2" fill="#B22222"/>

    <!-- highlight -->
    <rect x="8"  y="10" width="2" height="2" fill="#ff7777"/>
    <rect x="6"  y="12" width="2" height="2" fill="#ff7777"/>
    <rect x="10" y="12" width="2" height="2" fill="#ff7777"/>
  </g>
</svg>
