<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- 8-bit pixel leather quiver with 3 arrows -->

  <!-- Left arrow shaft + tip + fletching -->
  <rect x="9"  y="5"  width="2" height="9"  fill="#8B4513"/>
  <rect x="8"  y="3"  width="4" height="3"  fill="#D4AF37"/>
  <rect x="9"  y="1"  width="2" height="3"  fill="#FFD700"/>
  <rect x="7"  y="12" width="2" height="2"  fill="#E8E0C8"/>
  <rect x="11" y="12" width="2" height="2"  fill="#E8E0C8"/>

  <!-- Center arrow shaft + tip + fletching (tallest) -->
  <rect x="15" y="3"  width="2" height="11" fill="#8B4513"/>
  <rect x="14" y="1"  width="4" height="3"  fill="#D4AF37"/>
  <rect x="15" y="0"  width="2" height="2"  fill="#FFD700"/>
  <rect x="13" y="12" width="2" height="2"  fill="#E8E0C8"/>
  <rect x="17" y="12" width="2" height="2"  fill="#E8E0C8"/>

  <!-- Right arrow shaft + tip + fletching -->
  <rect x="21" y="6"  width="2" height="8"  fill="#8B4513"/>
  <rect x="20" y="4"  width="4" height="3"  fill="#D4AF37"/>
  <rect x="21" y="2"  width="2" height="3"  fill="#FFD700"/>
  <rect x="19" y="12" width="2" height="2"  fill="#E8E0C8"/>
  <rect x="23" y="12" width="2" height="2"  fill="#E8E0C8"/>

  <!-- Quiver top rim (dark) -->
  <rect x="6"  y="13" width="20" height="3"  fill="#4A2511"/>

  <!-- Quiver body -->
  <rect x="7"  y="16" width="18" height="12" fill="#8B4513"/>
  <!-- Left highlight -->
  <rect x="8"  y="16" width="4"  height="11" fill="#A0522D"/>
  <!-- Right shadow -->
  <rect x="20" y="16" width="4"  height="11" fill="#4A2511"/>

  <!-- Belt strap -->
  <rect x="6"  y="23" width="20" height="3"  fill="#4A2511"/>
  <!-- Gold buckle -->
  <rect x="13" y="23" width="6"  height="3"  fill="#D4AF37"/>
  <rect x="15" y="24" width="2"  height="1"  fill="#4A2511"/>

  <!-- Bottom cap -->
  <rect x="8"  y="28" width="16" height="3"  fill="#4A2511"/>
  <rect x="9"  y="30" width="14" height="2"  fill="#2A1408"/>
</svg>
