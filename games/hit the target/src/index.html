<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HIT THE TARGET — SHERWOOD FOREST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=MedievalSharp&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="game-wrapper">

    <header class="game-header">
      <h1 class="game-title">HIT THE TARGET</h1>
      <p class="game-subtitle">⚔ SHERWOOD FOREST EDITION ⚔</p>
    </header>

    <div class="game-main">

      <aside class="hud-panel">

        <div class="hud-block">
          <div class="hud-label">SCORE</div>
          <span id="score">0</span>
        </div>

        <div class="hud-block">
          <div class="hud-label">ARROWS</div>
          <div class="hud-arrows">
            <img src="./images/quiver.svg" alt="quiver" />
            <span id="nbArrows">10</span>
          </div>
        </div>

        <div class="hud-block">
          <div class="hud-label">LIVES</div>
          <div class="hud-lives">
            <img src="./images/heart.svg" alt="life" id="life-1" />
            <img src="./images/heart.svg" alt="life" id="life-2" />
            <img src="./images/heart.svg" alt="life" id="life-3" />
          </div>
        </div>

        <div class="hud-block">
          <div>CONTROLS</div>
          ← →&nbsp; MOVE<br/>
          SPACE&nbsp; SHOOT<br/>
          CLICK&nbsp; SHOOT
        </div>

      </aside>

      <div class="canvas-wrap">
        <canvas id="playfield" width="500" height="580" tabindex="1"></canvas>
      </div>

    </div>

    <div class="game-controls">
      <button id="stopAndStartGame">▶ START</button>
    </div>

    <footer class="game-footer">AMINE CHBARI &nbsp;•&nbsp; M1 INGÉNIERIE LOGICIEL &nbsp;•&nbsp; ISCOD</footer>

  </div>

</body>
</html>
