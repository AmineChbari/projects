services:

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: hotel-booking-api
    restart: unless-stopped
    networks:
      - hotel-net

  app:
    build:
      context: ./south-motel
      dockerfile: Dockerfile
    container_name: hotel-booking-app
    ports:
      - "4200:80"
    depends_on:
      - api
    networks:
      - hotel-net

networks:
  hotel-net:
    driver: bridge
