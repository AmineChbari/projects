<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoteApp — Voter</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            background-image: url('/images/img.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(17, 24, 39, 0.65);
            z-index: 0;
        }
        .content { position: relative; z-index: 1; }
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>

    <nav class="content fixed top-0 left-0 right-0 flex items-center justify-between px-6 py-3 z-50"
         style="background: rgba(17,24,39,0.6); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);">
        <span class="text-white font-bold text-lg">🗳️ VoteApp</span>
        <a href="/"
           class="flex items-center gap-2 text-sm text-white font-medium px-4 py-2 rounded-lg transition-all"
           style="background: rgba(255,255,255,0.12);"
           onmouseover="this.style.background='rgba(255,255,255,0.22)'"
           onmouseout="this.style.background='rgba(255,255,255,0.12)'">
            ← Accueil
        </a>
    </nav>

    <div class="content min-h-screen pt-24 pb-10 px-4 flex flex-col items-center">

        <div id="message" class="glass rounded-xl px-6 py-3 text-gray-200 text-sm mb-6 w-full max-w-xl text-center">
            Connexion en cours…
        </div>

        <div class="glass rounded-2xl p-8 w-full max-w-xl">
            <h1 class="text-3xl font-extrabold text-white mb-8 text-center">✅ Votre Vote</h1>

            <div class="flex items-center justify-between mb-6">
                <span class="text-gray-300 text-sm">État du scrutin</span>
                <span id="EtatVote" class="px-3 py-1 rounded-full text-sm font-semibold"
                      style="background: rgba(239,68,68,0.25); color: #fca5a5;">Fermé</span>
            </div>

            <div class="rounded-xl p-4 mb-6" style="background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3);">
                <p class="text-indigo-300 text-xs mb-1 font-semibold uppercase tracking-wider">Sujet du vote</p>
                <p id="voteActuel" class="text-white font-medium text-lg">—</p>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <button type="button" id="pour" data-vote="pour"
                        class="py-4 rounded-xl font-bold text-white text-lg transition-all hover:scale-105"
                        style="background: rgba(59,130,246,0.75);">
                    👍 POUR
                </button>
                <button type="button" id="contre" data-vote="contre"
                        class="py-4 rounded-xl font-bold text-white text-lg transition-all hover:scale-105"
                        style="background: rgba(239,68,68,0.75);">
                    👎 CONTRE
                </button>
                <button type="button" id="nppv" data-vote="nppv"
                        class="py-4 rounded-xl font-bold text-white text-lg transition-all hover:scale-105"
                        style="background: rgba(245,158,11,0.75);">
                    🤐 NPPV
                </button>
                <button type="button" id="abstention" data-vote="abstention"
                        class="py-4 rounded-xl font-bold text-white text-lg transition-all hover:scale-105"
                        style="background: rgba(107,114,128,0.75);">
                    ✋ ABSTENTION
                </button>
            </div>

            <div class="text-center">
                <p id="voteActuelUtilisateur" class="text-indigo-300 font-semibold text-sm"></p>
            </div>
        </div>

        <div id="resultats" class="w-full max-w-xl mt-6"></div>
    </div>
</body>
</html>
