<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>VoteApp — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <script defer="defer" src="scripts/admin.bundle.js"></script>
    <style>
        body {
            background-image: url('/images/img.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(17, 24, 39, 0.65);
            z-index: 0;
        }
        .content { position: relative; z-index: 1; }
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        button:disabled { opacity: 0.45; cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="content fixed top-0 left-0 right-0 flex items-center justify-between px-6 py-3 z-50"
         style="background: rgba(17,24,39,0.6); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);">
        <span class="text-white font-bold text-lg">🗳️ VoteApp</span>
        <a href="/"
           class="flex items-center gap-2 text-sm text-white font-medium px-4 py-2 rounded-lg transition-all"
           style="background: rgba(255,255,255,0.12);"
           onmouseover="this.style.background='rgba(255,255,255,0.22)'"
           onmouseout="this.style.background='rgba(255,255,255,0.12)'">
            ← Accueil
        </a>
    </nav>

    <!-- Page content -->
    <div class="content min-h-screen pt-24 pb-10 px-4 flex flex-col items-center">

        <!-- Status message -->
        <div id="message" class="glass rounded-xl px-6 py-3 text-gray-200 text-sm mb-6 w-full max-w-2xl text-center">
            Connexion en cours…
        </div>

        <div class="glass rounded-2xl p-8 w-full max-w-2xl">
            <h1 class="text-3xl font-extrabold text-white mb-8 text-center">⚙️ Admin Hub</h1>

            <!-- Participants & votes -->
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="rounded-xl p-4 text-center" style="background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.4);">
                    <p class="text-indigo-300 text-sm mb-1">Votants connectés</p>
                    <span id="participant" class="text-4xl font-extrabold text-white">0</span>
                </div>
                <div class="rounded-xl p-4 text-center" style="background: rgba(16,185,129,0.2); border: 1px solid rgba(16,185,129,0.4);">
                    <p class="text-green-300 text-sm mb-1">Votes enregistrés</p>
                    <span id="votes_count" class="text-4xl font-extrabold text-white">0</span>
                </div>
            </div>

            <!-- Live vote counts -->
            <div class="grid grid-cols-4 gap-3 mb-8">
                <div class="rounded-xl p-3 text-center" style="background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3);">
                    <p class="text-blue-300 text-xs mb-1 font-semibold">POUR</p>
                    <span id="vote_pour" class="text-2xl font-bold text-white">0</span>
                </div>
                <div class="rounded-xl p-3 text-center" style="background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);">
                    <p class="text-red-300 text-xs mb-1 font-semibold">CONTRE</p>
                    <span id="vote_contre" class="text-2xl font-bold text-white">0</span>
                </div>
                <div class="rounded-xl p-3 text-center" style="background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3);">
                    <p class="text-yellow-300 text-xs mb-1 font-semibold">NPPV</p>
                    <span id="vote_nppv" class="text-2xl font-bold text-white">0</span>
                </div>
                <div class="rounded-xl p-3 text-center" style="background: rgba(156,163,175,0.15); border: 1px solid rgba(156,163,175,0.3);">
                    <p class="text-gray-300 text-xs mb-1 font-semibold">ABST.</p>
                    <span id="vote_abst" class="text-2xl font-bold text-white">0</span>
                </div>
            </div>

            <!-- Vote control -->
            <div id="admin" style="display:none">
                <input id="sujet"
                       placeholder="Sujet du vote…"
                       class="w-full px-4 py-3 rounded-xl mb-4 text-white placeholder-gray-400 outline-none"
                       style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);">
                <div class="flex gap-3">
                    <button id="start" disabled="disabled"
                            class="flex-1 py-3 rounded-xl font-bold text-white transition-all"
                            style="background: rgba(16,185,129,0.8);">
                        ▶ Lancer le vote
                    </button>
                    <button id="end" disabled="disabled"
                            class="flex-1 py-3 rounded-xl font-bold text-white transition-all"
                            style="background: rgba(239,68,68,0.8);">
                        ■ Terminer le vote
                    </button>
                </div>
            </div>
        </div>

        <!-- Results zone -->
        <div id="resultats" class="w-full max-w-2xl mt-6"></div>

    </div>
</body>
</html>
