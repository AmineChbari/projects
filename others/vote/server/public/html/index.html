<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoteApp — Accueil</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url('/images/img.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(17, 24, 39, 0.65);
            z-index: 0;
        }
        .content { position: relative; z-index: 1; }
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .card-hover:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-4px);
        }
    </style>
</head>
<body>
    <div class="content min-h-screen flex flex-col items-center justify-center px-4 py-16">

        <!-- Hero -->
        <div class="text-center mb-14">
            <div class="text-5xl mb-4">🗳️</div>
            <h1 class="text-5xl font-extrabold text-white mb-4 tracking-tight drop-shadow-lg">
                VoteApp
            </h1>
            <p class="text-xl text-gray-300">Participez à la prise de décision collective, en temps réel.</p>
        </div>

        <!-- Navigation cards -->
        <nav class="grid md:grid-cols-3 gap-6 w-full max-w-3xl">

            <a href="/admin-vote" class="glass card-hover rounded-2xl p-8 text-center transition-all duration-300 cursor-pointer block">
                <div class="text-4xl mb-4">⚙️</div>
                <h2 class="text-xl font-bold text-white mb-2">Administration</h2>
                <p class="text-gray-400 text-sm">Lancer et gérer les votes</p>
            </a>

            <a href="/votant" class="glass card-hover rounded-2xl p-8 text-center transition-all duration-300 cursor-pointer block">
                <div class="text-4xl mb-4">✅</div>
                <h2 class="text-xl font-bold text-white mb-2">Voter</h2>
                <p class="text-gray-400 text-sm">Participer à un scrutin en cours</p>
            </a>

            <a href="/about" class="glass card-hover rounded-2xl p-8 text-center transition-all duration-300 cursor-pointer block">
                <div class="text-4xl mb-4">ℹ️</div>
                <h2 class="text-xl font-bold text-white mb-2">À propos</h2>
                <p class="text-gray-400 text-sm">Informations sur le projet</p>
            </a>

        </nav>

        <!-- Footer -->
        <p class="content text-gray-500 text-sm mt-14">
            Fait par <span class="text-indigo-400 font-medium">Amine Chbari</span>
        </p>
    </div>
</body>
</html>
